name: Build

on:
  push:
    branches: [ master, main, develop, "feature/*" ]
  pull_request:
    branches: [ master, main, develop ]

env:
  CMAKE_VERSION: 3.31.4
  BUILD_TYPE: Release
  BUILD_DIR: ${{ github.workspace }}/build
  VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}/.vcpkg-cache,readwrite"
  VCPKG_FEATURE_FLAGS: "binarycaching"
  VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/.vcpkg-cache
  DEPENDENCY_CACHE_VERSION: v1

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.os }} - ${{ matrix.build_type }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        build_type: [Debug, Release]
        include:
          - os: ubuntu-latest
            install_deps: |
              sudo apt-get update
              # Install Qt6 packages (correct names for Ubuntu)
              sudo apt-get install -y \
                qt6-base-dev qt6-base-dev-tools qt6-svg-dev \
                libgl1-mesa-dev \
                libxrandr-dev \
                libxcursor-dev \
                libxi-dev \
                libxinerama-dev \
                libx11-dev \
                libxext-dev \
                libudev-dev \
                libopenal-dev \
                libflac-dev \
                libvorbis-dev \
                libegl1-mesa-dev \
                libdrm-dev \
                libgbm-dev \
                libfreetype6-dev \
                zlib1g-dev
              # Build SFML 3 from source as it's not in Ubuntu repos yet
              git clone --depth 1 --branch 3.0.0 https://github.com/SFML/SFML.git
              cd SFML
              cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=ON
              cmake --build build --config Release
              sudo cmake --install build
              cd ..
              # Update library cache for SFML
              sudo ldconfig
              # Install spdlog (compatible version)
              git clone --depth 1 --branch v1.12.0 https://github.com/gabime/spdlog.git
              cd spdlog
              cmake -B build -DCMAKE_BUILD_TYPE=Release -DSPDLOG_BUILD_SHARED=ON
              cmake --build build --config Release
              sudo cmake --install build
              cd ..
              # Update library cache for spdlog
              sudo ldconfig
            
          - os: windows-latest
            install_deps: |
              # Use vcpkg for dependencies
              vcpkg install qtbase:x64-windows qttools:x64-windows qtsvg:x64-windows sfml:x64-windows spdlog:x64-windows zlib:x64-windows
            cmake_extra_args: -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake
            
          - os: macos-latest
            install_deps: |
              brew update
              brew install qt@6 zlib
              # Build SFML 3 from source
              git clone --depth 1 --branch 3.0.0 https://github.com/SFML/SFML.git
              cd SFML
              cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=ON
              cmake --build build --config Release
              sudo cmake --install build
              cd ..
              # Install spdlog (compatible version, same as Ubuntu)
              git clone --depth 1 --branch v1.12.0 https://github.com/gabime/spdlog.git
              cd spdlog
              cmake -B build -DCMAKE_BUILD_TYPE=Release -DSPDLOG_BUILD_SHARED=ON
              cmake --build build --config Release
              sudo cmake --install build
              cd ..

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Prepare vcpkg binary cache (Windows)
      if: matrix.os == 'windows-latest'
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path "$env:GITHUB_WORKSPACE\.vcpkg-cache" | Out-Null

    - name: Fix vfspp CMake version requirement
      shell: bash
      run: |
        # Patch vfspp CMakeLists.txt to use compatible CMake version
        if [ "${{ matrix.os }}" == "macos-latest" ]; then
          sed -i '.bak' 's/cmake_minimum_required(VERSION 3.50)/cmake_minimum_required(VERSION 3.20)/' vendor/vfspp/CMakeLists.txt
        else
          sed -i 's/cmake_minimum_required(VERSION 3.50)/cmake_minimum_required(VERSION 3.20)/' vendor/vfspp/CMakeLists.txt
        fi

    - name: Set up CMake
      uses: lukka/get-cmake@latest
      with:
        cmakeVersion: ${{ env.CMAKE_VERSION }}

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/vcpkg
          ~/.cache/vcpkg
          ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
          ~/Library/Caches/Homebrew
          /usr/local/Cellar
          /opt/homebrew/Cellar
          C:/vcpkg
        key: ${{ runner.os }}-${{ matrix.build_type }}-deps-${{ env.DEPENDENCY_CACHE_VERSION }}
        restore-keys: |
          ${{ runner.os }}-${{ matrix.build_type }}-deps-
          ${{ runner.os }}-deps-

    - name: Install dependencies
      shell: bash
      run: ${{ matrix.install_deps }}

    - name: Configure CMake
      shell: bash
      run: |
        if [[ "${{ runner.os }}" == "Windows" ]]; then
          # Use Windows paths with proper escaping
          cmake -B "${{ env.BUILD_DIR }}" \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DGECK_BUILD_TESTS=ON \
            -DCMAKE_PREFIX_PATH="$CMAKE_PREFIX_PATH" \
            ${{ matrix.cmake_extra_args }} \
            -S "${{ github.workspace }}"
        else
          # Set library paths for CMake test discovery on Linux/macOS
          # On macOS, use the environment variables set by the Qt setup step
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            export CMAKE_PREFIX_PATH="/opt/homebrew/opt/qt@6:/usr/local/opt/qt@6:$CMAKE_PREFIX_PATH"
            export PATH="/opt/homebrew/opt/qt@6/bin:/usr/local/opt/qt@6/bin:$PATH"
            echo "Using DYLD_LIBRARY_PATH: $DYLD_LIBRARY_PATH"
            echo "Using LD_LIBRARY_PATH: $LD_LIBRARY_PATH"
          else
            export LD_LIBRARY_PATH=/usr/local/lib:$LD_LIBRARY_PATH
            export DYLD_LIBRARY_PATH=/usr/local/lib:$DYLD_LIBRARY_PATH
          fi
          
          cmake -B "${{ env.BUILD_DIR }}" \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DGECK_BUILD_TESTS=ON \
            -DSPDLOG_FMT_EXTERNAL=OFF \
            -DCMAKE_CXX_FLAGS="-Wno-error" \
            ${{ matrix.cmake_extra_args }} \
            -S "${{ github.workspace }}"
        fi

    - name: Build
      shell: bash
      run: |
        if [[ "${{ runner.os }}" != "Windows" ]]; then
          # Set library paths for Linux/macOS
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            export CMAKE_PREFIX_PATH="/opt/homebrew/opt/qt@6:/usr/local/opt/qt@6:$CMAKE_PREFIX_PATH"
            export PATH="/opt/homebrew/opt/qt@6/bin:/usr/local/opt/qt@6/bin:$PATH"
            echo "Using DYLD_LIBRARY_PATH: $DYLD_LIBRARY_PATH"
            echo "Using LD_LIBRARY_PATH: $LD_LIBRARY_PATH"
          else
            export LD_LIBRARY_PATH=/usr/local/lib:$LD_LIBRARY_PATH
            export DYLD_LIBRARY_PATH=/usr/local/lib:$DYLD_LIBRARY_PATH
          fi
        fi
        
        PARALLEL_ARGS="--parallel"
        if [[ "${{ runner.os }}" == "Linux" ]]; then
          PARALLEL_ARGS="--parallel 4"
        fi
        cmake --build "${{ env.BUILD_DIR }}" --config ${{ matrix.build_type }} ${PARALLEL_ARGS}

    - name: Run Unit Tests
      shell: bash
      working-directory: ${{ env.BUILD_DIR }}
      run: |
        if [[ "${{ runner.os }}" == "Windows" ]]; then
          # Run tests with proper configuration
          ctest -C ${{ matrix.build_type }} --output-on-failure --verbose
        else
          # Set library paths for Linux and macOS
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            echo "Using DYLD_LIBRARY_PATH: $DYLD_LIBRARY_PATH"
            echo "Using LD_LIBRARY_PATH: $LD_LIBRARY_PATH"
          else
            export LD_LIBRARY_PATH=/usr/local/lib:$LD_LIBRARY_PATH
            export DYLD_LIBRARY_PATH=/usr/local/lib:$DYLD_LIBRARY_PATH
          fi
          
          # Set Qt platform to offscreen for headless testing on Linux
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            export QT_QPA_PLATFORM=offscreen
          fi
          
          ctest --output-on-failure --verbose
        fi

    - name: Run Performance Benchmarks
      if: matrix.build_type == 'Release' && runner.os != 'Windows'
      shell: bash
      working-directory: ${{ env.BUILD_DIR }}
      run: |
        # Set library paths
        if [[ "${{ runner.os }}" == "macOS" ]]; then
          echo "Using DYLD_LIBRARY_PATH: $DYLD_LIBRARY_PATH"
          echo "Using LD_LIBRARY_PATH: $LD_LIBRARY_PATH"
        else
          export LD_LIBRARY_PATH=/usr/local/lib:$LD_LIBRARY_PATH
          export DYLD_LIBRARY_PATH=/usr/local/lib:$DYLD_LIBRARY_PATH
        fi
        
        # Run benchmarks
        if [[ -x "./performance_tests" ]]; then
          ./performance_tests "[performance]" --benchmark-samples 50 --reporter xml --out benchmark_results.xml
        elif [[ -x "./tests/performance_tests" ]]; then
          ./tests/performance_tests "[performance]" --benchmark-samples 50 --reporter xml --out benchmark_results.xml
        else
          echo "Performance test executable not found, skipping benchmarks"
          exit 0
        fi

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: gecko-${{ matrix.os }}-${{ matrix.build_type }}
        path: |
          ${{ env.BUILD_DIR }}/src/gecko*
          ${{ env.BUILD_DIR }}/tests/*_tests*
        retention-days: 7

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ matrix.os }}-${{ matrix.build_type }}
        path: |
          test-results/
          ${{ env.BUILD_DIR }}/Testing/
        retention-days: 7

    - name: Upload benchmark results
      if: matrix.build_type == 'Release' && runner.os != 'Windows'
      uses: actions/upload-artifact@v4
      with:
        name: benchmark-results-${{ matrix.os }}
        path: |
          ${{ env.BUILD_DIR }}/benchmark_results.xml
        retention-days: 30
