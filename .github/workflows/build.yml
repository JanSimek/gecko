name: Build

on:
  push:
    branches: [ master, main, develop, "feature/*" ]
  pull_request:
    branches: [ master, main, develop ]

env:
  CMAKE_VERSION: 3.31.4
  BUILD_TYPE: Release
  BUILD_DIR: ${{ github.workspace }}/build
  VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}/.vcpkg-cache,readwrite"
  VCPKG_FEATURE_FLAGS: "manifests,binarycaching"
  VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/.vcpkg-cache
  VCPKG_MANIFEST_MODE: "ON"
  QT_VERSION: "6.7.2"
  DEPENDENCY_CACHE_VERSION: v2
  VCPKG_ROOT: ${{ github.workspace }}/vcpkg

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.os }} - ${{ matrix.build_type }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        build_type: [Debug, Release]
        include:
          - os: ubuntu-latest
            qt_host: linux
            qt_arch: gcc_64
            qt_modules: "qtbase qttools qtsvg qtimageformats"
            install_deps: |
              sudo apt-get update
              sudo apt-get install -y \
                libgl1-mesa-dev \
                libxrandr-dev \
                libxcursor-dev \
                libxi-dev \
                libxinerama-dev \
                libx11-dev \
                libxext-dev \
                libudev-dev \
                libopenal-dev \
                libflac-dev \
                libvorbis-dev \
                libegl1-mesa-dev \
                libdrm-dev \
                libgbm-dev \
                libfreetype6-dev \
                zlib1g-dev
              # Build SFML 3 from source as it's not in Ubuntu repos yet
              git clone --depth 1 --branch 3.0.0 https://github.com/SFML/SFML.git
              cd SFML
              cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=ON
              cmake --build build --config Release
              sudo cmake --install build
              cd ..
              # Update library cache for SFML
              sudo ldconfig
              # Install spdlog (compatible version)
              git clone --depth 1 --branch v1.12.0 https://github.com/gabime/spdlog.git
              cd spdlog
              cmake -B build -DCMAKE_BUILD_TYPE=Release -DSPDLOG_BUILD_SHARED=ON
              cmake --build build --config Release
              sudo cmake --install build
              cd ..
              # Update library cache for spdlog
              sudo ldconfig
            
          - os: windows-latest
            qt_host: windows
            qt_arch: win64_msvc2022_64
            qt_modules: ""
            install_deps: |
              # Setup vcpkg if not cached
              if [ ! -f "$VCPKG_ROOT/vcpkg.exe" ]; then
                rm -rf "$VCPKG_ROOT"
                git clone https://github.com/Microsoft/vcpkg.git "$VCPKG_ROOT"
                cd "$VCPKG_ROOT"
                ./bootstrap-vcpkg.bat -disableMetrics
                cd ..
              else
                echo "Using cached vcpkg installation"
              fi
              # Update vcpkg to ensure we have latest port files
              cd "$VCPKG_ROOT" && git pull && cd ..
              # Install dependencies using manifest mode (will use binary cache if available)
              export VCPKG_MANIFEST_MODE=ON
              "$VCPKG_ROOT/vcpkg.exe" install \
                --triplet x64-windows \
                --host-triplet x64-windows \
                --x-manifest-root="${{ github.workspace }}" \
                --x-install-root="$VCPKG_ROOT/installed" \
                --clean-after-build
            cmake_extra_args: -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake -DVCPKG_TARGET_TRIPLET=x64-windows
            
          - os: macos-latest
            qt_host: mac
            qt_arch: clang_64
            qt_modules: "qtbase qttools qtsvg qtimageformats"
            install_deps: |
              brew update
              brew install zlib
              # Build SFML 3 from source
              git clone --depth 1 --branch 3.0.0 https://github.com/SFML/SFML.git
              cd SFML
              cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=ON
              cmake --build build --config Release
              sudo cmake --install build
              cd ..
              # Install spdlog (compatible version, same as Ubuntu)
              git clone --depth 1 --branch v1.12.0 https://github.com/gabime/spdlog.git
              cd spdlog
              cmake -B build -DCMAKE_BUILD_TYPE=Release -DSPDLOG_BUILD_SHARED=ON
              cmake --build build --config Release
              sudo cmake --install build
              cd ..

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Prepare vcpkg directories (Windows)
      if: matrix.os == 'windows-latest'
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path "$env:GITHUB_WORKSPACE\.vcpkg-cache" | Out-Null
        New-Item -ItemType Directory -Force -Path "$env:VCPKG_ROOT" -ErrorAction SilentlyContinue | Out-Null

    - name: Fix vfspp CMake version requirement
      shell: bash
      run: |
        # Patch vfspp CMakeLists.txt to use compatible CMake version
        if [ "${{ matrix.os }}" == "macos-latest" ]; then
          sed -i '.bak' 's/cmake_minimum_required(VERSION 3.50)/cmake_minimum_required(VERSION 3.20)/' vendor/vfspp/CMakeLists.txt
        else
          sed -i 's/cmake_minimum_required(VERSION 3.50)/cmake_minimum_required(VERSION 3.20)/' vendor/vfspp/CMakeLists.txt
        fi

    - name: Set up CMake
      uses: lukka/get-cmake@latest
      with:
        cmakeVersion: ${{ env.CMAKE_VERSION }}

    - name: Cache vcpkg (Windows)
      if: matrix.os == 'windows-latest'
      uses: actions/cache@v4
      with:
        path: |
          ${{ env.VCPKG_ROOT }}
          ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
          !${{ env.VCPKG_ROOT }}/buildtrees
          !${{ env.VCPKG_ROOT }}/packages
          !${{ env.VCPKG_ROOT }}/downloads
        key: ${{ runner.os }}-vcpkg-${{ matrix.build_type }}-${{ hashFiles('**/vcpkg.json', '**/vcpkg-configuration.json') }}-${{ env.DEPENDENCY_CACHE_VERSION }}
        restore-keys: |
          ${{ runner.os }}-vcpkg-${{ matrix.build_type }}-
          ${{ runner.os }}-vcpkg-

    - name: Cache Homebrew (macOS)
      if: matrix.os == 'macos-latest'
      uses: actions/cache@v4
      with:
        path: |
          ~/Library/Caches/Homebrew
          /usr/local/Cellar
          /opt/homebrew/Cellar
          /usr/local/lib
        key: ${{ runner.os }}-homebrew-${{ matrix.build_type }}-${{ env.DEPENDENCY_CACHE_VERSION }}
        restore-keys: |
          ${{ runner.os }}-homebrew-${{ matrix.build_type }}-
          ${{ runner.os }}-homebrew-

    - name: Cache Linux dependencies
      if: matrix.os == 'ubuntu-latest'
      uses: actions/cache@v4
      with:
        path: |
          /usr/local
          ~/.cache
        key: ${{ runner.os }}-deps-${{ matrix.build_type }}-${{ env.DEPENDENCY_CACHE_VERSION }}
        restore-keys: |
          ${{ runner.os }}-deps-${{ matrix.build_type }}-
          ${{ runner.os }}-deps-

    - name: Setup vcpkg environment (Windows)
      if: matrix.os == 'windows-latest'
      shell: bash
      run: |
        echo "VCPKG_BINARY_SOURCES=clear;files,${{ github.workspace }}/.vcpkg-cache,readwrite" >> $GITHUB_ENV
        echo "VCPKG_DEFAULT_BINARY_CACHE=${{ github.workspace }}/.vcpkg-cache" >> $GITHUB_ENV
        
    - name: Install dependencies
      shell: bash
      run: ${{ matrix.install_deps }}

    - name: Install Qt 6
      if: matrix.os != 'windows-latest'
      uses: jurplel/install-qt-action@v3
      with:
        version: ${{ env.QT_VERSION }}
        host: ${{ matrix.qt_host }}
        target: desktop
        arch: ${{ matrix.qt_arch }}
        modules: ${{ matrix.qt_modules }}
        cache: true
        cache-key-prefix: gecko-qt

    - name: Export Qt environment
      if: matrix.os != 'windows-latest'
      shell: bash
      run: |
        set -euo pipefail
        if [[ -z "${Qt6_DIR:-}" ]]; then
          echo "Qt6_DIR not provided by install-qt-action"
          exit 1
        fi
        qt_lib_cmake_dir="$(dirname "$Qt6_DIR")"
        qt_lib_dir="$(dirname "$qt_lib_cmake_dir")"
        qt_prefix="$(dirname "$qt_lib_dir")"
        echo "Qt6_DIR: $Qt6_DIR"
        echo "QT_PREFIX resolved to: $qt_prefix"
        {
          echo "QT_PREFIX=$qt_prefix"
          echo "Qt6_DIR=$Qt6_DIR"
        } >> "$GITHUB_ENV"
        if [[ -n "${CMAKE_PREFIX_PATH:-}" ]]; then
          echo "CMAKE_PREFIX_PATH=$qt_prefix:${CMAKE_PREFIX_PATH}" >> "$GITHUB_ENV"
        else
          echo "CMAKE_PREFIX_PATH=$qt_prefix" >> "$GITHUB_ENV"
        fi
        if [[ "${{ runner.os }}" == "macOS" ]]; then
          if [[ -n "${DYLD_LIBRARY_PATH:-}" ]]; then
            echo "DYLD_LIBRARY_PATH=$qt_prefix/lib:${DYLD_LIBRARY_PATH}" >> "$GITHUB_ENV"
          else
            echo "DYLD_LIBRARY_PATH=$qt_prefix/lib" >> "$GITHUB_ENV"
          fi
        else
          if [[ -n "${LD_LIBRARY_PATH:-}" ]]; then
            echo "LD_LIBRARY_PATH=$qt_prefix/lib:${LD_LIBRARY_PATH}" >> "$GITHUB_ENV"
          else
            echo "LD_LIBRARY_PATH=$qt_prefix/lib" >> "$GITHUB_ENV"
          fi
        fi
        echo "$qt_prefix/bin" >> "$GITHUB_PATH"

    - name: Configure CMake
      shell: bash
      run: |
        if [[ "${{ runner.os }}" == "Windows" ]]; then
          # Use Windows paths with proper escaping
          cmake -B "${{ env.BUILD_DIR }}" \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DGECK_BUILD_TESTS=ON \
            -DCMAKE_PREFIX_PATH="$CMAKE_PREFIX_PATH" \
            ${{ matrix.cmake_extra_args }} \
            -S "${{ github.workspace }}"
        else
          if [[ -z "${Qt6_DIR:-}" ]]; then
            echo "Error: Qt6_DIR is not set or does not exist"
            exit 1
          fi
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            export LD_LIBRARY_PATH=/usr/local/lib:${LD_LIBRARY_PATH:-}
            export DYLD_LIBRARY_PATH=/usr/local/lib:${DYLD_LIBRARY_PATH:-}
          fi
          echo "Using Qt6_DIR: $Qt6_DIR"
          echo "Using CMAKE_PREFIX_PATH: ${CMAKE_PREFIX_PATH:-}"
          EXTRA_ARGS=()
          EXTRA_ARGS+=("-DCMAKE_BUILD_TYPE=${{ matrix.build_type }}")
          EXTRA_ARGS+=("-DGECK_BUILD_TESTS=ON")
          EXTRA_ARGS+=("-DSPDLOG_FMT_EXTERNAL=OFF")
          EXTRA_ARGS+=("-DCMAKE_CXX_FLAGS=-Wno-error")
          EXTRA_ARGS+=("-DQt6_DIR=$Qt6_DIR")
          if [[ -n "${CMAKE_PREFIX_PATH:-}" ]]; then
            EXTRA_ARGS+=("-DCMAKE_PREFIX_PATH=$CMAKE_PREFIX_PATH")
          fi
          cmake -B "${{ env.BUILD_DIR }}" \
            "${EXTRA_ARGS[@]}" \
            ${{ matrix.cmake_extra_args }} \
            -S "${{ github.workspace }}"
        fi

    - name: Build
      shell: bash
      run: |
        if [[ "${{ runner.os }}" != "Windows" ]]; then
          # Set library paths for Linux/macOS
          if [[ -z "${QT_PREFIX:-}" ]]; then
            if [[ -n "${Qt6_DIR:-}" ]]; then
              qt_lib_cmake_dir="$(dirname "$Qt6_DIR")"
              qt_lib_dir="$(dirname "$qt_lib_cmake_dir")"
              QT_PREFIX="$(dirname "$qt_lib_dir")"
            else
              echo "Error: QT_PREFIX not set for build step"
              exit 1
            fi
          fi
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            export DYLD_LIBRARY_PATH="${QT_PREFIX}/lib:${DYLD_LIBRARY_PATH:-}"
          else
            export LD_LIBRARY_PATH="/usr/local/lib:${LD_LIBRARY_PATH:-}"
            export LD_LIBRARY_PATH="${QT_PREFIX}/lib:${LD_LIBRARY_PATH}"
          fi
          echo "Using QT_PREFIX: $QT_PREFIX"
          echo "Using DYLD_LIBRARY_PATH: ${DYLD_LIBRARY_PATH:-}"
          echo "Using LD_LIBRARY_PATH: ${LD_LIBRARY_PATH:-}"
        fi
        
        PARALLEL_ARGS="--parallel"
        if [[ "${{ runner.os }}" == "Linux" ]]; then
          PARALLEL_ARGS="--parallel 4"
        fi
        cmake --build "${{ env.BUILD_DIR }}" --config ${{ matrix.build_type }} ${PARALLEL_ARGS}

    - name: Run Unit Tests
      shell: bash
      working-directory: ${{ env.BUILD_DIR }}
      run: |
        if [[ "${{ runner.os }}" == "Windows" ]]; then
          # Run tests with proper configuration
          ctest -C ${{ matrix.build_type }} --output-on-failure --verbose
        else
          # Set library paths for Linux and macOS
          if [[ -z "${QT_PREFIX:-}" ]]; then
            if [[ -n "${Qt6_DIR:-}" ]]; then
              qt_lib_cmake_dir="$(dirname "$Qt6_DIR")"
              qt_lib_dir="$(dirname "$qt_lib_cmake_dir")"
              QT_PREFIX="$(dirname "$qt_lib_dir")"
            else
              echo "Error: QT_PREFIX not set for test step"
              exit 1
            fi
          fi
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            export DYLD_LIBRARY_PATH="${QT_PREFIX}/lib:${DYLD_LIBRARY_PATH:-}"
            echo "Using DYLD_LIBRARY_PATH: $DYLD_LIBRARY_PATH"
          else
            export LD_LIBRARY_PATH="/usr/local/lib:${LD_LIBRARY_PATH:-}"
            export LD_LIBRARY_PATH="${QT_PREFIX}/lib:${LD_LIBRARY_PATH}"
            echo "Using LD_LIBRARY_PATH: $LD_LIBRARY_PATH"
          fi
          echo "Using CMAKE_PREFIX_PATH: ${CMAKE_PREFIX_PATH:-}"
          
          # Set Qt platform to offscreen for headless testing on Linux
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            export QT_QPA_PLATFORM=offscreen
          fi
          
          ctest --output-on-failure --verbose
        fi

    - name: Run Performance Benchmarks
      if: matrix.build_type == 'Release' && runner.os != 'Windows'
      shell: bash
      working-directory: ${{ env.BUILD_DIR }}
      run: |
        # Set library paths
        if [[ "${{ runner.os }}" == "macOS" ]]; then
          if [[ -z "${QT_PREFIX:-}" ]]; then
            if [[ -n "${Qt6_DIR:-}" ]]; then
              qt_lib_cmake_dir="$(dirname "$Qt6_DIR")"
              qt_lib_dir="$(dirname "$qt_lib_cmake_dir")"
              QT_PREFIX="$(dirname "$qt_lib_dir")"
            else
              echo "Error: QT_PREFIX not set for macOS benchmark step"
              exit 1
            fi
          fi
          export DYLD_LIBRARY_PATH="${QT_PREFIX}/lib:${DYLD_LIBRARY_PATH:-}"
          echo "Using DYLD_LIBRARY_PATH: $DYLD_LIBRARY_PATH"
          echo "Using CMAKE_PREFIX_PATH: ${CMAKE_PREFIX_PATH:-}"
        else
          export LD_LIBRARY_PATH=/usr/local/lib:$LD_LIBRARY_PATH
          export DYLD_LIBRARY_PATH=/usr/local/lib:$DYLD_LIBRARY_PATH
        fi
        
        # Run benchmarks
        if [[ -x "./performance_tests" ]]; then
          ./performance_tests "[performance]" --benchmark-samples 50 --reporter xml --out benchmark_results.xml
        elif [[ -x "./tests/performance_tests" ]]; then
          ./tests/performance_tests "[performance]" --benchmark-samples 50 --reporter xml --out benchmark_results.xml
        else
          echo "Performance test executable not found, skipping benchmarks"
          exit 0
        fi

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: gecko-${{ matrix.os }}-${{ matrix.build_type }}
        path: |
          ${{ env.BUILD_DIR }}/src/gecko*
          ${{ env.BUILD_DIR }}/tests/*_tests*
        retention-days: 7

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ matrix.os }}-${{ matrix.build_type }}
        path: |
          test-results/
          ${{ env.BUILD_DIR }}/Testing/
        retention-days: 7

    - name: Upload benchmark results
      if: matrix.build_type == 'Release' && runner.os != 'Windows'
      uses: actions/upload-artifact@v4
      with:
        name: benchmark-results-${{ matrix.os }}
        path: |
          ${{ env.BUILD_DIR }}/benchmark_results.xml
        retention-days: 30
