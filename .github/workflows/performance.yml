name: Performance Benchmarks

on:
  schedule:
    # Run at 2 AM UTC every day
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      benchmark_samples:
        description: 'Number of benchmark samples'
        required: false
        default: '200'
      compare_with_main:
        description: 'Compare with main branch'
        required: false
        default: 'true'
        type: boolean

env:
  CMAKE_VERSION: 3.31.4
  BUILD_TYPE: Release
  BUILD_DIR: ${{ github.workspace }}/build

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  benchmark:
    name: Performance Benchmarks - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        include:
          - os: ubuntu-latest
            install_deps: |
              sudo apt-get update
              sudo apt-get install -y \
                qt6-base-dev qt6-base-dev-tools \
                libgl1-mesa-dev \
                libxrandr-dev \
                libxcursor-dev \
                libxi-dev \
                libxinerama-dev \
                libx11-dev \
                libxext-dev \
                libudev-dev \
                libopenal-dev \
                libflac-dev \
                libvorbis-dev \
                libegl1-mesa-dev \
                libdrm-dev \
                libgbm-dev \
                libfreetype6-dev \
                zlib1g-dev
              # Build SFML 3 from source
              git clone --depth 1 --branch 3.0.0 https://github.com/SFML/SFML.git
              cd SFML
              cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=ON
              cmake --build build --config Release
              sudo cmake --install build
              cd ..
              sudo ldconfig
              # Install spdlog
              git clone --depth 1 --branch v1.12.0 https://github.com/gabime/spdlog.git
              cd spdlog
              cmake -B build -DCMAKE_BUILD_TYPE=Release -DSPDLOG_BUILD_SHARED=ON
              cmake --build build --config Release
              sudo cmake --install build
              cd ..
              sudo ldconfig
            
          - os: macos-latest
            install_deps: |
              brew install zlib
              # Build SFML 3 from source
              git clone --depth 1 --branch 3.0.0 https://github.com/SFML/SFML.git
              cd SFML
              cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=ON
              cmake --build build --config Release
              sudo cmake --install build
              cd ..
              # Install spdlog
              git clone --depth 1 --branch v1.12.0 https://github.com/gabime/spdlog.git
              cd spdlog
              cmake -B build -DCMAKE_BUILD_TYPE=Release -DSPDLOG_BUILD_SHARED=ON
              cmake --build build --config Release
              sudo cmake --install build
              cd ..

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0  # Need full history for branch comparison

    - name: Fix vfspp CMake version requirement
      shell: bash
      run: |
        if [ "${{ matrix.os }}" == "macos-latest" ]; then
          sed -i '.bak' 's/cmake_minimum_required(VERSION 3.50)/cmake_minimum_required(VERSION 3.20)/' vendor/vfspp/CMakeLists.txt
        else
          sed -i 's/cmake_minimum_required(VERSION 3.50)/cmake_minimum_required(VERSION 3.20)/' vendor/vfspp/CMakeLists.txt
        fi

    - name: Set up CMake
      uses: lukka/get-cmake@latest
      with:
        cmakeVersion: ${{ env.CMAKE_VERSION }}

    - name: Install dependencies
      shell: bash
      run: ${{ matrix.install_deps }}

    - name: Setup Qt6 on macOS
      if: runner.os == 'macOS'
      shell: bash
      run: |
        brew install qt@6 double-conversion libb2 md4c dbus
        brew link qt@6 --force --overwrite
        brew link double-conversion --force
        brew link libb2 --force
        brew link md4c --force
        brew link dbus --force
        
        HOMEBREW_PREFIX=$(brew --prefix)
        QT6_PATH=$(brew --prefix qt@6)
        LIBB2_PATH=$(brew --prefix libb2)
        MD4C_PATH=$(brew --prefix md4c)
        DBUS_PATH=$(brew --prefix dbus)
        
        export DYLD_LIBRARY_PATH="$LIBB2_PATH/lib:$MD4C_PATH/lib:$DBUS_PATH/lib:$HOMEBREW_PREFIX/lib:$DYLD_LIBRARY_PATH"
        export LD_LIBRARY_PATH="$LIBB2_PATH/lib:$MD4C_PATH/lib:$DBUS_PATH/lib:$HOMEBREW_PREFIX/lib:$LD_LIBRARY_PATH"
        echo "DYLD_LIBRARY_PATH=$DYLD_LIBRARY_PATH" >> $GITHUB_ENV
        echo "LD_LIBRARY_PATH=$LD_LIBRARY_PATH" >> $GITHUB_ENV
        
        export CMAKE_PREFIX_PATH="$QT6_PATH/lib/cmake:$CMAKE_PREFIX_PATH"
        export Qt6_DIR="$QT6_PATH/lib/cmake/Qt6"
        echo "CMAKE_PREFIX_PATH=$CMAKE_PREFIX_PATH" >> $GITHUB_ENV
        echo "Qt6_DIR=$Qt6_DIR" >> $GITHUB_ENV

    - name: Configure CMake
      shell: bash
      run: |
        if [[ "${{ runner.os }}" == "macOS" ]]; then
          echo "Using DYLD_LIBRARY_PATH: $DYLD_LIBRARY_PATH"
          echo "Using LD_LIBRARY_PATH: $LD_LIBRARY_PATH"
        else
          export LD_LIBRARY_PATH=/usr/local/lib:$LD_LIBRARY_PATH
          export DYLD_LIBRARY_PATH=/usr/local/lib:$DYLD_LIBRARY_PATH
        fi
        
        cmake -B "${{ env.BUILD_DIR }}" \
          -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
          -DGECK_BUILD_TESTS=ON \
          -DGECK_AUTO_TEST=OFF \
          -DSPDLOG_FMT_EXTERNAL=OFF \
          -DCMAKE_CXX_FLAGS="-Wno-error" \
          -S "${{ github.workspace }}"

    - name: Build
      shell: bash
      run: |
        if [[ "${{ runner.os }}" == "macOS" ]]; then
          echo "Using DYLD_LIBRARY_PATH: $DYLD_LIBRARY_PATH"
          echo "Using LD_LIBRARY_PATH: $LD_LIBRARY_PATH"
        else
          export LD_LIBRARY_PATH=/usr/local/lib:$LD_LIBRARY_PATH
          export DYLD_LIBRARY_PATH=/usr/local/lib:$DYLD_LIBRARY_PATH
        fi
        cmake --build "${{ env.BUILD_DIR }}" --config ${{ env.BUILD_TYPE }} --parallel

    - name: Run Performance Benchmarks
      shell: bash
      working-directory: ${{ env.BUILD_DIR }}
      run: |
        # Set library paths
        if [[ "${{ runner.os }}" == "macOS" ]]; then
          echo "Using DYLD_LIBRARY_PATH: $DYLD_LIBRARY_PATH"
          echo "Using LD_LIBRARY_PATH: $LD_LIBRARY_PATH"
        else
          export LD_LIBRARY_PATH=/usr/local/lib:$LD_LIBRARY_PATH
          export DYLD_LIBRARY_PATH=/usr/local/lib:$DYLD_LIBRARY_PATH
        fi
        
        # Determine number of samples
        SAMPLES="${{ github.event.inputs.benchmark_samples || '200' }}"
        
        # Run benchmarks
        if [[ -x "./performance_tests" ]]; then
          PERF_TEST="./performance_tests"
        elif [[ -x "./tests/performance_tests" ]]; then
          PERF_TEST="./tests/performance_tests"
        else
          echo "Performance test executable not found!"
          exit 1
        fi
        
        echo "Running benchmarks with $SAMPLES samples..."
        $PERF_TEST "[performance]" --benchmark-samples $SAMPLES --reporter xml --out benchmark_results.xml
        
        # Copy tracking script
        cp ${{ github.workspace }}/scripts/track_performance.py .
        
        # Check for baseline
        BASELINE_FILE="${{ github.workspace }}/tests/performance/baseline.json"
        if [[ ! -f "$BASELINE_FILE" ]]; then
          echo "No baseline found, creating initial baseline..."
          python3 track_performance.py benchmark_results.xml \
            --baseline "$BASELINE_FILE" \
            --update-baseline \
            --json-output benchmark_results.json \
            --markdown-output benchmark_report.md
        else
          # Compare with baseline
          python3 track_performance.py benchmark_results.xml \
            --baseline "$BASELINE_FILE" \
            --threshold 0.03 \
            --json-output benchmark_results.json \
            --markdown-output benchmark_report.md
        fi
        
        # Display results
        echo "=== Performance Benchmark Results ==="
        cat benchmark_report.md

    - name: Compare with main branch
      if: github.event.inputs.compare_with_main == 'true' && github.ref != 'refs/heads/main'
      shell: bash
      working-directory: ${{ github.workspace }}
      run: |
        # Save current results
        cp ${{ env.BUILD_DIR }}/benchmark_results.json current_results.json
        
        # Checkout main branch
        git checkout main
        
        # Build main branch
        cmake -B build-main \
          -DCMAKE_BUILD_TYPE=Release \
          -DGECK_BUILD_TESTS=ON \
          -DGECK_AUTO_TEST=OFF \
          -DSPDLOG_FMT_EXTERNAL=OFF \
          -DCMAKE_CXX_FLAGS="-Wno-error"
        
        cmake --build build-main --config Release --parallel
        
        # Run benchmarks on main
        cd build-main
        if [[ -x "./performance_tests" ]]; then
          PERF_TEST="./performance_tests"
        elif [[ -x "./tests/performance_tests" ]]; then
          PERF_TEST="./tests/performance_tests"
        else
          echo "Performance test executable not found in main branch!"
          exit 1
        fi
        
        $PERF_TEST "[performance]" --benchmark-samples 100 --reporter xml --out main_benchmark.xml
        
        # Analyze main results
        python3 ${{ github.workspace }}/scripts/track_performance.py main_benchmark.xml \
          --json-output main_results.json
        
        # Compare branches
        cd ${{ github.workspace }}
        python3 scripts/compare_performance.py files build-main/main_results.json current_results.json \
          --threshold 0.03 > branch_comparison.md
        
        echo "=== Branch Comparison ==="
        cat branch_comparison.md

    - name: Upload benchmark artifacts
      uses: actions/upload-artifact@v4
      with:
        name: benchmark-${{ matrix.os }}-${{ github.run_number }}
        path: |
          ${{ env.BUILD_DIR }}/benchmark_results.xml
          ${{ env.BUILD_DIR }}/benchmark_results.json
          ${{ env.BUILD_DIR }}/benchmark_report.md
          branch_comparison.md
        retention-days: 90

    - name: Publish to GitHub Pages
      if: github.ref == 'refs/heads/main' && matrix.os == 'ubuntu-latest'
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ${{ env.BUILD_DIR }}
        destination_dir: benchmarks/${{ github.run_number }}
        keep_files: true

  notify:
    name: Notify on Performance Regression
    needs: benchmark
    runs-on: ubuntu-latest
    if: failure()
    steps:
    - name: Create issue for performance regression
      uses: actions/create-issue@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        title: "Performance Regression Detected - Run #${{ github.run_number }}"
        body: |
          A performance regression was detected in the nightly benchmark run.
          
          **Run Details:**
          - Run Number: ${{ github.run_number }}
          - Commit: ${{ github.sha }}
          - Branch: ${{ github.ref }}
          
          Please check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.
        labels: performance, regression