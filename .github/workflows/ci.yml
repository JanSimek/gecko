name: CI

# Skip CI for docs/text-only changes: a run is suppressed only when EVERY changed file
# matches one of these patterns (a mixed code+docs change still builds).
on:
  push:
    branches: [ master, develop ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
  pull_request:
    branches: [ master, develop ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
  workflow_dispatch:

# Cancel superseded runs for the same branch/PR so the queue doesn't pile up with stale
# builds. master is excluded, so a merge's mainline validation always runs to completion.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

env:
  CMAKE_VERSION: 3.31.4
  QT_VERSION: 6.8.3

jobs:
  include-hygiene:
    name: Include hygiene
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Forbid relative ".." quote-includes in src/
      run: |
        if grep -rEn '#include "\.\./' src; then
          echo "::error::Relative '..' includes found. Use root-relative paths (relative to src/)."
          exit 1
        fi
        echo "OK: no relative '..' includes in src/"

  build-linux:
    name: Linux - ${{ matrix.build_type }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        build_type: [Release, Debug]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install CMake
      uses: lukka/get-cmake@latest
      with:
        cmakeVersion: ${{ env.CMAKE_VERSION }}

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        aqtversion: '==3.3.0'
        version: ${{ env.QT_VERSION }}
        host: 'linux'
        target: 'desktop'
        arch: 'linux_gcc_64'
        cache: true

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libgl1-mesa-dev \
          libxrandr-dev \
          libxcursor-dev \
          libudev-dev \
          libfreetype6-dev \
          zlib1g-dev \
          libxinerama-dev \
          libxi-dev \
          ninja-build

    - name: Setup ccache
      uses: hendrikmuhs/ccache-action@d62db5f07c26379fc4b4e0916f098a92573c3b03 # v1.2.23
      with:
        key: ${{ runner.os }}-${{ matrix.build_type }}

    - name: Cache SFML
      id: cache-sfml
      uses: actions/cache@v4
      with:
        path: ${{ runner.temp }}/sfml-install
        key: ${{ runner.os }}-sfml-3.0.1

    - name: Build and install SFML 3
      if: steps.cache-sfml.outputs.cache-hit != 'true'
      run: |
        git clone --depth 1 --branch 3.0.1 https://github.com/SFML/SFML.git
        cd SFML
        cmake -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DBUILD_SHARED_LIBS=ON \
          -DSFML_BUILD_AUDIO=OFF \
          -DSFML_BUILD_NETWORK=OFF \
          -DCMAKE_INSTALL_PREFIX=${{ runner.temp }}/sfml-install
        cmake --build build --config Release
        cmake --install build
        cd ..

    - name: Configure CMake
      run: |
        cmake -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
          -DGECK_BUILD_TESTS=ON \
          -DGECK_USE_SYSTEM_LIBS=ON \
          -DCMAKE_C_COMPILER_LAUNCHER=ccache \
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
          -DQt6_DIR=$Qt6_DIR \
          -DCMAKE_PREFIX_PATH=${{ runner.temp }}/sfml-install

    - name: Build
      run: cmake --build build --config ${{ matrix.build_type }} --parallel

    - name: Run tests
      run: |
        export LD_LIBRARY_PATH=${{ runner.temp }}/sfml-install/lib:$LD_LIBRARY_PATH
        ctest --test-dir build --output-on-failure --parallel

  # Dedicated job that builds the optional Tier-2 scripting runtime (embeds Luau) and
  # runs the Luau integration tests, so the flagged path and its dependency stay tested.
  # The default jobs above build with scripting OFF (the end-user default).
  build-linux-scripting:
    name: Linux - Scripting
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install CMake
      uses: lukka/get-cmake@latest
      with:
        cmakeVersion: ${{ env.CMAKE_VERSION }}

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        aqtversion: '==3.3.0'
        version: ${{ env.QT_VERSION }}
        host: 'linux'
        target: 'desktop'
        arch: 'linux_gcc_64'
        cache: true

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libgl1-mesa-dev \
          libxrandr-dev \
          libxcursor-dev \
          libudev-dev \
          libfreetype6-dev \
          zlib1g-dev \
          libxinerama-dev \
          libxi-dev \
          ninja-build

    - name: Setup ccache
      uses: hendrikmuhs/ccache-action@d62db5f07c26379fc4b4e0916f098a92573c3b03 # v1.2.23
      with:
        key: ${{ runner.os }}-scripting

    - name: Cache SFML
      id: cache-sfml
      uses: actions/cache@v4
      with:
        path: ${{ runner.temp }}/sfml-install
        key: ${{ runner.os }}-sfml-3.0.1

    - name: Build and install SFML 3
      if: steps.cache-sfml.outputs.cache-hit != 'true'
      run: |
        git clone --depth 1 --branch 3.0.1 https://github.com/SFML/SFML.git
        cd SFML
        cmake -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DBUILD_SHARED_LIBS=ON \
          -DSFML_BUILD_AUDIO=OFF \
          -DSFML_BUILD_NETWORK=OFF \
          -DCMAKE_INSTALL_PREFIX=${{ runner.temp }}/sfml-install
        cmake --build build --config Release
        cmake --install build
        cd ..

    - name: Configure CMake (scripting enabled)
      run: |
        cmake -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DGECK_BUILD_TESTS=ON \
          -DGECK_USE_SYSTEM_LIBS=ON \
          -DGECK_ENABLE_SCRIPTING=ON \
          -DCMAKE_C_COMPILER_LAUNCHER=ccache \
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
          -DQt6_DIR=$Qt6_DIR \
          -DCMAKE_PREFIX_PATH=${{ runner.temp }}/sfml-install

    - name: Build
      run: cmake --build build --config Release --parallel

    - name: Run tests (incl. Luau scripting)
      run: |
        export LD_LIBRARY_PATH=${{ runner.temp }}/sfml-install/lib:$LD_LIBRARY_PATH
        ctest --test-dir build --output-on-failure --parallel

  build-macos:
    name: macOS - ${{ matrix.build_type }}
    runs-on: macos-latest
    # macOS is the slowest runner and the maintainer develops on macOS (local builds cover
    # it), so run it on mainline pushes + manual dispatch rather than on every PR.
    if: github.event_name != 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        build_type: [Release, Debug]
        qt_arch: ['clang_64']

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install CMake
      uses: lukka/get-cmake@latest
      with:
        cmakeVersion: ${{ env.CMAKE_VERSION }}

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        aqtversion: '==3.3.0'
        version: ${{ env.QT_VERSION }}
        host: 'mac'
        target: 'desktop'
        arch: ${{ matrix.qt_arch }}
        cache: true

    - name: Setup ccache
      uses: hendrikmuhs/ccache-action@d62db5f07c26379fc4b4e0916f098a92573c3b03 # v1.2.23
      with:
        key: ${{ runner.os }}-${{ matrix.build_type }}

    - name: Cache SFML
      id: cache-sfml
      uses: actions/cache@v4
      with:
        path: ${{ runner.temp }}/sfml-install
        key: ${{ runner.os }}-sfml-3.0.1

    - name: Build and install SFML 3
      if: steps.cache-sfml.outputs.cache-hit != 'true'
      run: |
        git clone --depth 1 --branch 3.0.1 https://github.com/SFML/SFML.git
        cd SFML
        cmake -B build \
          -DCMAKE_BUILD_TYPE=Release \
          -DBUILD_SHARED_LIBS=ON \
          -DSFML_BUILD_AUDIO=OFF \
          -DSFML_BUILD_NETWORK=OFF \
          -DCMAKE_INSTALL_PREFIX=${{ runner.temp }}/sfml-install
        cmake --build build --config Release
        cmake --install build
        cd ..

    - name: Configure CMake
      run: |
        cmake -B build \
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
          -DGECK_BUILD_TESTS=ON \
          -DGECK_USE_SYSTEM_LIBS=ON \
          -DCMAKE_C_COMPILER_LAUNCHER=ccache \
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
          -DQt6_DIR=$Qt6_DIR \
          -DCMAKE_PREFIX_PATH=${{ runner.temp }}/sfml-install

    - name: Build
      run: cmake --build build --config ${{ matrix.build_type }} --parallel

    - name: Run tests
      run: |
        export DYLD_LIBRARY_PATH=${{ runner.temp }}/sfml-install/lib:$DYLD_LIBRARY_PATH
        ctest --test-dir build --output-on-failure --parallel

  build-windows:
    name: Windows - ${{ matrix.build_type }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        # Full matrix on master/dispatch; only Release on PRs to cut PR time
        # (Windows is the slowest build after macOS).
        build_type: ${{ (github.event_name == 'pull_request') && fromJSON('["Release"]') || fromJSON('["Release", "Debug"]') }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install CMake
      uses: lukka/get-cmake@latest
      with:
        cmakeVersion: ${{ env.CMAKE_VERSION }}

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        aqtversion: '==3.3.0'
        version: ${{ env.QT_VERSION }}
        host: 'windows'
        target: 'desktop'
        arch: 'win64_msvc2022_64'
        cache: true

    # Caching MSVC needs a compiler launcher, which the Visual Studio generator can't
    # use — so the main build below switches to Ninja, which needs cl.exe on PATH.
    - name: Setup MSVC environment
      uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1.13.0
      with:
        arch: x64

    - name: Setup sccache
      uses: hendrikmuhs/ccache-action@d62db5f07c26379fc4b4e0916f098a92573c3b03 # v1.2.23
      with:
        variant: sccache
        key: ${{ runner.os }}-${{ matrix.build_type }}

    - name: Cache SFML
      id: cache-sfml
      uses: actions/cache@v4
      with:
        path: ${{ runner.temp }}/sfml-install
        key: ${{ runner.os }}-sfml-3.0.1

    - name: Build and install SFML 3
      if: steps.cache-sfml.outputs.cache-hit != 'true'
      shell: cmd
      run: |
        git clone --depth 1 --branch 3.0.1 https://github.com/SFML/SFML.git
        cd SFML
        cmake -B build -DCMAKE_BUILD_TYPE=Release ^
          -DBUILD_SHARED_LIBS=ON ^
          -DSFML_BUILD_AUDIO=OFF ^
          -DSFML_BUILD_NETWORK=OFF ^
          -DCMAKE_INSTALL_PREFIX=${{ runner.temp }}/sfml-install
        cmake --build build --config Release
        cmake --install build --config Release
        cd ..

    - name: Configure CMake
      shell: cmd
      run: |
        cmake -B build -G Ninja ^
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} ^
          -DGECK_BUILD_TESTS=ON ^
          -DGECK_USE_SYSTEM_LIBS=ON ^
          -DCMAKE_C_COMPILER_LAUNCHER=sccache ^
          -DCMAKE_CXX_COMPILER_LAUNCHER=sccache ^
          -DCMAKE_POLICY_DEFAULT_CMP0141=NEW ^
          -DCMAKE_MSVC_DEBUG_INFORMATION_FORMAT=Embedded ^
          -DQt6_DIR=%Qt6_DIR% ^
          -DCMAKE_PREFIX_PATH=${{ runner.temp }}/sfml-install

    - name: Build
      run: cmake --build build --config ${{ matrix.build_type }} --parallel

    - name: Run tests
      shell: cmd
      run: |
        set PATH=${{ runner.temp }}\sfml-install\bin;%PATH%
        ctest --test-dir build --output-on-failure --parallel
